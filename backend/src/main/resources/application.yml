server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: YOUR USERNAME
    password: YOUR PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: YOUR JWT SECRET KEY
    expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE